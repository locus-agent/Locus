name: Deploy GitHub Pages

# The watch pipeline pushes dashboard *data* (docs/status.json,
# classifications.json, journal.json, exit_decisions.json) on every cycle.
# Those pushes must NOT trigger a Pages deploy — only changes to the static
# site (HTML / SVG / .nojekyll) should. Hence the explicit paths filter below.
on:
  push:
    branches: [main]
    paths:
      - docs/index.html
      - docs/classifications.html
      - docs/decisions.html
      - docs/journal.html
      - docs/*.svg
      - docs/.nojekyll
      - .github/workflows/pages.yml
  # Allow manual redeploys from the Actions tab.
  workflow_dispatch:

# Standard GitHub Pages permissions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
