<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOCUS · classification log</title>
<style>
  :root {
    --bg: #1a1a1a;
    --panel: #141414;
    --purple: #534AB7;
    --green: #2bd47e;
    --red: #e05a5a;
    --yellow: #d9b94a;
    --cyan: #56c8d8;
    --text: #e2e2e2;
    --muted: #888888;
    --row-border: #2a2a2a;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', Monaco, 'Courier New', Consolas, monospace;
    font-size: 14px;
    line-height: 1.5;
  }

  .topbar { background: var(--purple); color: #fafafa; }

  .topbar-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 6px 16px;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  .topbar .title { font-weight: 700; letter-spacing: 0.08em; }
  .topbar .subtitle { color: #d8d4f2; }

  .topbar a.back {
    margin-left: auto;
    color: #fafafa;
    text-decoration: none;
    font-size: 12px;
    border-bottom: 1px dotted #d8d4f2;
  }

  .wrap { max-width: 1400px; margin: 0 auto; padding: 20px 16px 48px; }

  .panel {
    background: var(--panel);
    border: 1px solid var(--purple);
    border-radius: 6px;
    padding: 10px 14px;
  }

  .panel-title {
    color: var(--purple);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  /* Tables */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    white-space: nowrap;
  }

  .table-scroll { overflow-x: auto; }

  th, td {
    padding: 7px 10px;
    text-align: left;
    border-bottom: 1px solid var(--row-border);
  }

  th {
    color: var(--muted);
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.05em;
    font-weight: 700;
  }

  tr:last-child td { border-bottom: none; }

  td.market, td.headline {
    white-space: normal;
    max-width: 360px;
  }

  .dir-bullish { color: var(--green); font-weight: 700; }
  .dir-bearish { color: var(--red); font-weight: 700; }
  .dir-neutral { color: var(--muted); }

  .action-signal { color: var(--green); font-weight: 700; }
  .action-skip { color: var(--muted); }
  .action-stale { color: var(--yellow); }
  .action-capped { color: var(--cyan); }
  .action-confirm { color: var(--cyan); }
  .action-opportunity { color: var(--green); font-weight: 700; }
  .action-error { color: var(--red); font-weight: 700; }

  /* Match-source badges */
  .match-badge {
    display: inline-block;
    padding: 1px 7px;
    border: 1px solid var(--row-border);
    border-radius: 3px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--muted);
  }
  .match-badge.sem { color: var(--purple); border-color: var(--purple); }
  .match-badge.both { color: var(--green); border-color: var(--green); }

  .empty { color: var(--muted); font-style: italic; padding: 16px; text-align: center; }

  /* Pagination */
  .pager {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-top: 14px;
    font-size: 12px;
    color: var(--muted);
  }

  .pager button {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--purple);
    border-radius: 4px;
    padding: 4px 12px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }
  .pager button:hover:not(:disabled) { color: var(--green); border-color: var(--green); }
  .pager button:disabled { color: var(--muted); border-color: var(--row-border); cursor: default; opacity: 0.5; }

  footer {
    margin-top: 32px;
    padding-top: 16px;
    border-top: 1px solid var(--row-border);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    color: var(--muted);
    font-size: 12px;
  }

  footer a { color: var(--text); text-decoration: none; border-bottom: 1px dotted var(--muted); }
  footer a:hover { color: var(--green); border-color: var(--green); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <span class="title">LOCUS</span>
    <span class="subtitle">· classification log — every call</span>
    <a class="back" href="index.html">← dashboard</a>
  </div>
</div>

<div class="wrap">
  <div class="panel">
    <div class="panel-title">Classification Log — full history</div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Market</th>
            <th>Headline</th>
            <th>Match</th>
            <th>Direction</th>
            <th>Materiality</th>
            <th>Confidence</th>
            <th>Edge</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="classification-rows">
          <tr><td colspan="9" class="empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>
    <div class="pager" id="pager" hidden>
      <button id="prev">← prev</button>
      <span id="pager-info"></span>
      <button id="next">next →</button>
    </div>
  </div>

  <footer>
    <a href="index.html">← back to dashboard</a>
    <a href="https://github.com/locus-agent/Locus" target="_blank" rel="noopener">github.com/locus-agent/Locus</a>
  </footer>
</div>

<script>
  const PAGE_SIZE = 50;
  let rows = [];
  let page = 0;

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str ?? '';
    return div.innerHTML;
  }

  function fmtTime(iso) {
    if (!iso) return '—';
    const normalized = iso.includes('T') ? iso : iso.replace(' ', 'T') + 'Z';
    const d = new Date(normalized);
    if (isNaN(d.getTime())) return iso;
    return d.toLocaleString('en-US', {
      month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit',
      timeZone: 'UTC', timeZoneName: 'short',
    });
  }

  function fmtPct(value) {
    if (value === null || value === undefined) return '—';
    return Math.round(value * 100) + '%';
  }

  function directionClass(dir) {
    if (dir === 'bullish') return 'dir-bullish';
    if (dir === 'bearish') return 'dir-bearish';
    return 'dir-neutral';
  }

  function directionArrow(dir) {
    if (dir === 'bullish') return '▲ bullish';
    if (dir === 'bearish') return '▼ bearish';
    return '· neutral';
  }

  function actionClass(action) {
    if (action === 'signal') return 'action-signal';
    if (action === 'stale') return 'action-stale';
    if (action === 'capped') return 'action-capped';
    if (action === 'needs_confirmation') return 'action-confirm';
    if (action === 'whale_triggered' || action === 'reentry_triggered') return 'action-opportunity';
    if (action === 'error') return 'action-error';
    return 'action-skip';
  }

  function matchBadge(source) {
    if (!source) return '<span class="match-badge">—</span>';
    if (source === 'keyword') return '<span class="match-badge">kw</span>';
    if (source === 'embedding') return '<span class="match-badge sem">sem</span>';
    if (source === 'both') return '<span class="match-badge both">both</span>';
    return '<span class="match-badge">' + escapeHtml(source) + '</span>';
  }

  function renderPage() {
    const tbody = document.getElementById('classification-rows');
    const pageCount = Math.max(1, Math.ceil(rows.length / PAGE_SIZE));
    page = Math.min(Math.max(0, page), pageCount - 1);
    const slice = rows.slice(page * PAGE_SIZE, page * PAGE_SIZE + PAGE_SIZE);

    tbody.innerHTML = slice.map(c => `
      <tr>
        <td>${fmtTime(c.time)}</td>
        <td class="market">${escapeHtml(c.market_question)}</td>
        <td class="headline">${escapeHtml(c.headline)}</td>
        <td>${matchBadge(c.match_source)}</td>
        <td class="${directionClass(c.direction)}">${directionArrow(c.direction)}</td>
        <td>${fmtPct(c.materiality)}</td>
        <td>${fmtPct(c.confidence)}</td>
        <td>${fmtPct(c.edge)}</td>
        <td class="${actionClass(c.action)}">${escapeHtml(c.action)}</td>
      </tr>
    `).join('');

    const start = page * PAGE_SIZE + 1;
    const end = Math.min(rows.length, (page + 1) * PAGE_SIZE);
    document.getElementById('pager-info').textContent =
      `${start}–${end} of ${rows.length} · page ${page + 1} of ${pageCount}`;
    document.getElementById('prev').disabled = page === 0;
    document.getElementById('next').disabled = page >= pageCount - 1;
  }

  async function load() {
    const tbody = document.getElementById('classification-rows');
    try {
      const resp = await fetch('classifications.json?_=' + Date.now());
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      rows = data.classifications || [];
      if (rows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="empty">No classifications yet.</td></tr>';
        return;
      }
      document.getElementById('pager').hidden = false;
      renderPage();
    } catch (e) {
      tbody.innerHTML = '<tr><td colspan="9" class="empty">classifications.json unavailable</td></tr>';
      console.error(e);
    }
  }

  document.getElementById('prev').addEventListener('click', () => { page--; renderPage(); window.scrollTo(0, 0); });
  document.getElementById('next').addEventListener('click', () => { page++; renderPage(); window.scrollTo(0, 0); });

  load();
</script>
</body>
</html>
