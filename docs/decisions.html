<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOCUS · exit decisions</title>
<style>
  :root {
    --bg: #1a1a1a;
    --panel: #141414;
    --purple: #534AB7;
    --green: #2bd47e;
    --red: #e05a5a;
    --yellow: #d9b94a;
    --text: #e2e2e2;
    --muted: #888888;
    --row-border: #2a2a2a;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', Monaco, 'Courier New', Consolas, monospace;
    font-size: 14px;
    line-height: 1.5;
  }

  .topbar { background: var(--purple); color: #fafafa; }

  .topbar-inner {
    max-width: 800px;
    margin: 0 auto;
    padding: 6px 16px;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  .topbar .title { font-weight: 700; letter-spacing: 0.08em; }
  .topbar .subtitle { color: #d8d4f2; }

  .topbar a.back {
    margin-left: auto;
    color: #fafafa;
    text-decoration: none;
    font-size: 12px;
    border-bottom: 1px dotted #d8d4f2;
  }

  .wrap { max-width: 800px; margin: 0 auto; padding: 20px 16px 48px; }

  .panel {
    background: var(--panel);
    border: 1px solid var(--purple);
    border-radius: 6px;
    padding: 10px 14px;
  }

  .panel-title {
    color: var(--purple);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .decision-card {
    border-bottom: 1px solid var(--row-border);
    padding: 12px 0;
  }
  .decision-card:last-child { border-bottom: none; }

  .decision-meta { color: var(--muted); font-size: 11px; margin-bottom: 4px; }
  .decision-meta .purple { color: var(--purple); font-weight: 700; }
  .decision-text { font-size: 13px; }

  .decision-close { color: var(--red); font-weight: 700; }
  .decision-close_half { color: var(--yellow); font-weight: 700; }
  .decision-hold { color: var(--green); font-weight: 700; }
  .pnl-pos { color: var(--green); font-weight: 700; }
  .pnl-neg { color: var(--red); font-weight: 700; }

  .empty { color: var(--muted); font-style: italic; padding: 16px; text-align: center; }

  footer {
    margin-top: 32px;
    padding-top: 16px;
    border-top: 1px solid var(--row-border);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    color: var(--muted);
    font-size: 12px;
  }

  footer a { color: var(--text); text-decoration: none; border-bottom: 1px dotted var(--muted); }
  footer a:hover { color: var(--green); border-color: var(--green); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <span class="title">LOCUS</span>
    <span class="subtitle">· exit decisions — every re-evaluation</span>
    <a class="back" href="index.html">← dashboard</a>
  </div>
</div>

<div class="wrap">
  <div class="panel">
    <div class="panel-title">Exit Decisions — full history</div>
    <div id="decisions-list">
      <div class="empty">Loading…</div>
    </div>
  </div>

  <footer>
    <a href="index.html">← back to dashboard</a>
    <a href="https://github.com/locus-agent/Locus" target="_blank" rel="noopener">github.com/locus-agent/Locus</a>
  </footer>
</div>

<script>
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str ?? '';
    return div.innerHTML;
  }

  function fmtTime(iso) {
    if (!iso) return '—';
    const normalized = iso.includes('T') ? iso : iso.replace(' ', 'T') + 'Z';
    const d = new Date(normalized);
    if (isNaN(d.getTime())) return iso;
    return d.toLocaleString('en-US', {
      month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit',
      timeZone: 'UTC', timeZoneName: 'short',
    });
  }

  function fmtPnlPct(v) {
    if (v === null || v === undefined) return '—';
    const cls = v >= 0 ? 'pnl-pos' : 'pnl-neg';
    const txt = (v >= 0 ? '+' : '−') + Math.abs(v).toFixed(1) + '%';
    return '<span class="' + cls + '">' + txt + '</span>';
  }

  async function load() {
    const container = document.getElementById('decisions-list');
    try {
      const resp = await fetch('exit_decisions.json?_=' + Date.now());
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      const rows = data.decisions || [];
      if (rows.length === 0) {
        container.innerHTML = '<div class="empty">No re-evaluations yet — triggers: +50% / −30% / contradicting news.</div>';
        return;
      }
      container.innerHTML = rows.map(d => `
        <div class="decision-card">
          <div class="decision-meta">
            ${fmtTime(d.time)} · ${escapeHtml(d.market_question)} (${escapeHtml(d.side)}) ·
            trigger <span class="purple">${escapeHtml(d.trigger)}</span>
            at ${fmtPnlPct(d.pnl_pct)} (YES ${d.yes_price == null ? '—' : d.yes_price.toFixed(3)}) →
            <span class="decision-${escapeHtml(d.decision)}">${escapeHtml(d.decision)}</span>
          </div>
          <div class="decision-text">${escapeHtml(d.reasoning)}</div>
        </div>
      `).join('');
    } catch (e) {
      container.innerHTML = '<div class="empty">exit_decisions.json unavailable</div>';
      console.error(e);
    }
  }

  load();
</script>
</body>
</html>
