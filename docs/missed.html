<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOCUS · missed opportunities</title>
<style>
  :root {
    --bg: #1a1a1a;
    --panel: #141414;
    --purple: #534AB7;
    --green: #2bd47e;
    --red: #e05a5a;
    --text: #e2e2e2;
    --muted: #888888;
    --row-border: #2a2a2a;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', Monaco, 'Courier New', Consolas, monospace;
    font-size: 14px;
    line-height: 1.5;
  }

  .topbar { background: var(--purple); color: #fafafa; }

  .topbar-inner {
    max-width: 800px;
    margin: 0 auto;
    padding: 6px 16px;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  .topbar .title { font-weight: 700; letter-spacing: 0.08em; }
  .topbar .subtitle { color: #d8d4f2; }

  .topbar a.back {
    margin-left: auto;
    color: #fafafa;
    text-decoration: none;
    font-size: 12px;
    border-bottom: 1px dotted #d8d4f2;
  }

  .wrap { max-width: 800px; margin: 0 auto; padding: 20px 16px 48px; }

  .panel {
    background: var(--panel);
    border: 1px solid var(--purple);
    border-radius: 6px;
    padding: 10px 14px;
  }

  .panel-title {
    color: var(--purple);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .missed-entry { border-bottom: 1px solid var(--row-border); padding: 12px 0; }
  .missed-entry:last-child { border-bottom: none; }

  .missed-entry .missed-head {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }
  .missed-entry .missed-time { color: var(--muted); font-size: 11px; letter-spacing: 0.05em; }
  .missed-entry .missed-market { font-size: 13px; font-weight: 700; }
  .missed-entry .missed-market a { color: var(--text); text-decoration: none; border-bottom: 1px dotted var(--muted); }
  .missed-entry .missed-market a:hover { color: var(--green); border-color: var(--green); }
  .missed-entry .missed-meta { color: var(--muted); font-size: 12px; margin: 2px 0; }
  .missed-entry .missed-move { color: var(--green); font-weight: 700; }
  .missed-entry .missed-reflection { font-size: 13px; font-style: italic; margin-top: 6px; }

  .empty { color: var(--muted); font-style: italic; padding: 16px; text-align: center; }

  footer {
    margin-top: 32px;
    padding-top: 16px;
    border-top: 1px solid var(--row-border);
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    color: var(--muted);
    font-size: 12px;
  }

  footer a { color: var(--text); text-decoration: none; border-bottom: 1px dotted var(--muted); }
  footer a:hover { color: var(--green); border-color: var(--green); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <span class="title">LOCUS</span>
    <span class="subtitle">· missed opportunities — full archive</span>
    <a class="back" href="index.html">← dashboard</a>
  </div>
</div>

<div class="wrap">
  <div class="panel">
    <div class="panel-title">Missed Opportunities — full history</div>
    <div id="missed-list">
      <div class="empty">Loading…</div>
    </div>
  </div>

  <footer>
    <a href="index.html">← back to dashboard</a>
    <a href="https://github.com/locus-agent/Locus" target="_blank" rel="noopener">github.com/locus-agent/Locus</a>
  </footer>
</div>

<script>
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str ?? '';
    return div.innerHTML;
  }

  function marketCell(question, slug) {
    const text = escapeHtml(question);
    if (!slug) return text;
    const url = 'https://polymarket.com/event/' + encodeURIComponent(slug);
    return '<a href="' + url + '" target="_blank" rel="noopener">' + text + '</a>';
  }

  function missedEntryHtml(m) {
    const move = (m.pct_move == null) ? '' :
      `<span class="missed-move">+${Number(m.pct_move).toFixed(0)}%</span>`;
    const mat = (m.materiality == null) ? '' :
      ` · materiality ${Number(m.materiality).toFixed(2)}`;
    return `
      <div class="missed-entry">
        <div class="missed-head">
          <span class="missed-market">${marketCell(m.market_question, m.slug)}</span>
          <span class="missed-time">${escapeHtml(m.time)}</span>
        </div>
        <div class="missed-meta">Skipped because: ${escapeHtml(m.action || '—')} · ${escapeHtml((m.direction || '').toUpperCase())}${mat}</div>
        <div class="missed-meta">Price moved: ${move}</div>
        <div class="missed-reflection">${escapeHtml(m.reflection)}</div>
      </div>`;
  }

  async function load() {
    const container = document.getElementById('missed-list');
    try {
      const resp = await fetch('missed.json?_=' + Date.now());
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      const entries = data.missed || [];
      if (entries.length === 0) {
        container.innerHTML = '<div class="empty">No missed opportunities flagged yet.</div>';
        return;
      }
      container.innerHTML = entries.map(missedEntryHtml).join('');
    } catch (e) {
      container.innerHTML = '<div class="empty">missed.json unavailable</div>';
      console.error(e);
    }
  }

  load();
</script>
</body>
</html>
